<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>学习笔记 - Chenxi Zeng</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">Chenxi Zeng</a>
      <nav class="nav" aria-label="主导航">
        <a class="home-link" href="index.html">首页</a>
        <a href="about.html">关于</a>
        <a href="projects.html">项目</a>
        <a href="honors.html">荣誉</a>
        <a aria-current="page" href="notes.html">学习笔记</a>
      </nav>
    </header>

    <main class="page notes-page">
      <section class="page-title">
        <p class="eyebrow">Notes Library</p>
        <h1>学习笔记</h1>
        <p>这里整理课程学习、竞赛训练和科研笔记，支持按学科分类浏览、标题搜索、PDF 在线预览与下载。</p>
      </section>

      <section class="notes-overview" aria-label="笔记概览">
        <article class="notes-stat-card">
          <span id="publicCount">87</span>
          <p>公开候选</p>
        </article>
        <aside class="category-panel" aria-label="学科分类">
          <div class="category-panel-head">
            <p class="eyebrow">Subjects</p>
            <h2>学科分类</h2>
          </div>
          <div id="categoryCards" class="category-cards"></div>
        </aside>
      </section>

      <section class="notes-tools public-notes-tools">
        <label class="search-box">
          <span>搜索标题</span>
          <input id="searchInput" type="search" placeholder="输入课程、章节、关键词">
        </label>
        <label class="select-box">
          <span>学科分类</span>
          <select id="categorySelect">
            <option value="all">全部分类</option>
          </select>
        </label>
      </section>

      <section>
        <div class="section-head compact">
          <p class="eyebrow">PDF Notes</p>
          <h2>笔记列表</h2>
        </div>
        <div id="notesList" class="notes-list" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer">
      <span>© 2026 Chenxi Zeng</span>
      <span>Built for GitHub Pages</span>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
